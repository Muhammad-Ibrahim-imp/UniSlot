# ============================================================
# APPLICATION CONFIGURATION
# ============================================================
spring:
  application:
    name: Backend

  # ?? Database (MySQL) ?????????????????????????????????????????
  # Changed to Postgre
  datasource:
    url: ${DATABASE_URL}?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  # ?? JPA / Hibernate ?????????????????????????????????????????
  jpa:
    hibernate:
      # 'update' auto-adjusts schema; use 'validate' in production
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        # dialect: org.hibernate.dialect.PostgreSQLDialect   # Hibernate 7 (Spring Boot 4)
        format_sql: true
        # Enable batch inserts for performance
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true

  # ?? File upload limits ???????????????????????????????????????
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ?? Server ????????????????????????????????????????????????????
server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# ?? JWT Security ??????????????????????????????????????????????
app:
  jwt:
    # CHANGE THIS to a strong 256-bit secret in production
    secret: ${JWT_SECRET:MyVeryStrongSecretKeyForJWTSigning2024SlotSelectorApp}
    # Token validity: 24 hours in milliseconds
    expiration-ms: 86400000
  # Directory where generated PDF schedules are stored
  pdf:
    output-dir: ${PDF_OUTPUT_DIR:./generated-pdfs}

# ?? Swagger / OpenAPI ?????????????????????????????????????????
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# ?? Logging ???????????????????????????????????????????????????
logging:
  level:
    DBMS.UniSlot.Backend: DEBUG
    org.springframework.security: INFO
