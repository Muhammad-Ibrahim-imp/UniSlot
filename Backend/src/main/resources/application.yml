# ============================================================
# APPLICATION CONFIGURATION
# ============================================================
spring:
  application:
    name: slot-selector

  # ?? Database (MySQL) ?????????????????????????????????????????
  datasource:
    url: jdbc:mysql://localhost:3306/slot_selector_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: admin@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ?? JPA / Hibernate ?????????????????????????????????????????
  jpa:
    hibernate:
      # 'update' auto-adjusts schema; use 'validate' in production
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect   # Hibernate 7 (Spring Boot 4)
        format_sql: true
        # Enable batch inserts for performance
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true

  # ?? File upload limits ???????????????????????????????????????
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ?? Server ????????????????????????????????????????????????????
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ?? JWT Security ??????????????????????????????????????????????
app:
  jwt:
    # CHANGE THIS to a strong 256-bit secret in production
    secret: ${JWT_SECRET:MyVeryStrongSecretKeyForJWTSigning2024SlotSelectorApp}
    # Token validity: 24 hours in milliseconds
    expiration-ms: 86400000
  # Directory where generated PDF schedules are stored
  pdf:
    output-dir: ${PDF_OUTPUT_DIR:./generated-pdfs}

# ?? Swagger / OpenAPI ?????????????????????????????????????????
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# ?? Logging ???????????????????????????????????????????????????
logging:
  level:
    com.university.slotselector: DEBUG
    org.springframework.security: INFO
