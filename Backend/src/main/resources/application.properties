# ============================================================
# APPLICATION CONFIGURATION
# ============================================================
spring.application.name=slot-selector

# ?? Database (MySQL) ?????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/slot_selector_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA / Hibernate ?????????????????????????????????????????
# 'update' auto-adjusts schema; use 'validate' in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Enable batch inserts for performance
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ?? File upload limits ???????????????????????????????????????
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ?? Server ????????????????????????????????????????????????????
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ?? JWT Security ??????????????????????????????????????????????
# CHANGE THIS to a strong 256-bit secret in production
app.jwt.secret=${JWT_SECRET:MyVeryStrongSecretKeyForJWTSigning2024SlotSelectorApp}
# Token validity: 24 hours in milliseconds
app.jwt.expiration-ms=86400000
# Directory where generated PDF schedules are stored
app.pdf.output-dir=${PDF_OUTPUT_DIR:./generated-pdfs}

# ?? Swagger / OpenAPI ?????????????????????????????????????????
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ?? Logging ???????????????????????????????????????????????????
logging.level.com.university.slotselector=DEBUG
logging.level.org.springframework.security=INFO
